sonar.projectKey=Quitch_GW-AI-Overhaul
sonar.organization=quitch
sonar.projectVersion=6.2.3

# javascript:S7721 (unicorn/consistent-function-scoping) is scoped out of shipped ui/**
# code. PA loads ui/** via RequireJS <script> injection, so a helper hoisted out of a
# define() factory to the "outer scope" the rule wants becomes a window global; GWO keeps
# such helpers module-private inside define() and accepts S7721 there. See CONTRIBUTING.md
# ("Function scoping in shipped UI code"). The rule stays active for scripts/** and
# test/** (real CommonJS modules, where hoisting is safe and beneficial).
# NOTE: SonarCloud automatic analysis does NOT read sonar-project.properties - this entry
# drives the local `sonar` CLI gate and any future CI scanner; the same rule/path ignore
# is mirrored in the SonarCloud UI (Analysis Scope) for the automatic push scan.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S7721
sonar.issue.ignore.multicriteria.e1.resourceKey=ui/**/*.js