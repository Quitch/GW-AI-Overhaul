sonar.projectKey=Quitch_GW-AI-Overhaul
sonar.organization=quitch
sonar.projectVersion=6.2.3
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Coverage-metric exclusions. These files are still fully analysed for bugs/smells -
# only their lines-to-cover are dropped, so a change touching only them can't drag the
# "Coverage on New Code" gate down for code that shouldn't be unit-tested in the first
# place. Every entry below is genuinely-untestable-under-the-Node-harness or has its
# correctness guarded elsewhere; this is honest scoping, not padding the metric.
#
#   - scripts/**, test/**   Node-only tooling (see CLAUDE.md), not shipped mod code.
#   - cards/**              223 tech cards. Their contract shape is enforced by
#                           `validate:cards` and their buff()/dull() AI-mod descriptors
#                           are executed and checked by `validate:ai-mods` (real
#                           behavioural enforcement, just in uninstrumented processes
#                           that don't feed lcov). The reusable logic they delegate to
#                           (shared/cards.js) stays measured. Only honest while cards
#                           stay thin - see CONTRIBUTING.md ("Coverage and new code").
#   - pure define({...}) data blobs   nothing to assert; correctness is guarded by
#                           `validate:schemas` / `validate:refs`, not unit tests.
#   - DOM / knockout / createjs UI glue   binds model/api/ko/$/createjs and the DOM at
#                           runtime, near-zero assertable logic, and can't load under
#                           the Node AMD harness (which deliberately leaves those
#                           engine globals unstubbed - see CLAUDE.md "Test harness").
#
# The logic layer stays measured on purpose (shared/{cards,deal,ai,spec_cache,specs,
# referee_ai_paths,...}.js, gw_start/ai_tech.js, gw_play/referee_*.js,
# gw_per_player_tech_referee.js, shared/js/gw_galaxy.js) - new logic there must be tested.
sonar.coverage.exclusions=\
  scripts/**,\
  test/**,\
  ui/main/game/galactic_war/cards/**,\
  ui/mods/com.pa.quitch.gwaioverhaul/faction/cluster_planets.js,\
  ui/mods/com.pa.quitch.gwaioverhaul/faction/personalities.js,\
